[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "taop-agent-b"
version = "0.0.1"
description = "TAOP Agent B — discovers and uses Agent A's capability via the TAOP Python SDK"
requires-python = ">=3.10"
dependencies = [
    "taop",
    "requests>=2.28",
]

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[tool.setuptools.packages.find]
where = ["."]
